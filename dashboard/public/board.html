<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mini-RAFT Drawing Board</title>
    <style>
      :root {
        --bg: #f4f2ea;
        --panel: #fefdf9;
        --ink: #161616;
        --accent: #0f766e;
        --pending: #ef4444;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", "Segoe UI", sans-serif;
        background: radial-gradient(circle at top left, #f9efe1 0%, var(--bg) 45%, #e7f0ee 100%);
        color: var(--ink);
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 1rem;
      }

      .shell {
        width: min(1100px, 96vw);
        background: var(--panel);
        border: 2px solid var(--ink);
        border-radius: 18px;
        box-shadow: 10px 12px 0 #d5d0c2;
        overflow: hidden;
      }

      .header {
        padding: 0.9rem 1.1rem;
        border-bottom: 2px solid var(--ink);
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 1rem;
      }

      .header h1 {
        font-size: 1.25rem;
        margin: 0;
      }

      .status {
        font-size: 0.9rem;
      }

      .toolbar {
        border-bottom: 2px solid var(--ink);
        padding: 0.65rem 0.9rem;
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.5rem 0.75rem;
        background: linear-gradient(180deg, #f6f4ed 0%, #fefdf9 100%);
      }

      .tool-button {
        border: 2px solid var(--ink);
        background: #fff;
        color: var(--ink);
        border-radius: 10px;
        font: inherit;
        font-size: 0.85rem;
        padding: 0.35rem 0.7rem;
        cursor: pointer;
      }

      .tool-button:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      .tool-button.active {
        background: var(--accent);
        color: #fff;
      }

      .control-group {
        display: inline-flex;
        align-items: center;
        gap: 0.4rem;
        font-size: 0.84rem;
      }

      #sizePicker {
        width: 140px;
      }

      #board {
        width: 100%;
        height: min(74vh, 680px);
        display: block;
        background: linear-gradient(180deg, #fffdfa 0%, #fffaf2 100%);
        touch-action: none;
        cursor: crosshair;
      }
    </style>
  </head>
  <body>
    <main class="shell">
      <div class="header">
        <h1>Distributed Drawing Board</h1>
        <div class="status" id="status">Connecting...</div>
      </div>

      <div class="toolbar">
        <button class="tool-button active" data-tool="pen">Pen</button>
        <button class="tool-button" data-tool="line">Line</button>
        <button class="tool-button" data-tool="rect">Rectangle</button>
        <button class="tool-button" data-tool="circle">Circle</button>
        <button class="tool-button" data-tool="eraser">Eraser</button>
        <button class="tool-button" id="undoBtn" type="button">Undo</button>
        <button class="tool-button" id="redoBtn" type="button">Redo</button>
        <button class="tool-button" id="clearBtn" type="button">Clear</button>
        <button class="tool-button" id="downloadBtn" type="button">Download PNG</button>

        <label class="control-group" for="colorPicker">
          Color
          <input id="colorPicker" type="color" value="#161616" />
        </label>

        <label class="control-group" for="sizePicker">
          Size
          <input id="sizePicker" type="range" min="1" max="40" value="3" />
          <span id="sizeValue">3</span>
        </label>

        <label class="control-group" for="fillToggle">
          Fill Shapes
          <input id="fillToggle" type="checkbox" />
        </label>
      </div>

      <canvas id="board"></canvas>
    </main>

    <script>
      const statusEl = document.getElementById("status");
      const canvas = document.getElementById("board");
      const ctx = canvas.getContext("2d");
      const colorPicker = document.getElementById("colorPicker");
      const sizePicker = document.getElementById("sizePicker");
      const sizeValue = document.getElementById("sizeValue");
      const fillToggle = document.getElementById("fillToggle");
      const undoBtn = document.getElementById("undoBtn");
      const redoBtn = document.getElementById("redoBtn");
      const clearBtn = document.getElementById("clearBtn");
      const downloadBtn = document.getElementById("downloadBtn");
      const toolButtons = Array.from(document.querySelectorAll(".tool-button[data-tool]"));
      const pending = new Map();

      let selectedTool = "pen";
      let selectedColor = "#161616";
      let selectedWidth = 3;
      let fillShapes = false;

      function setTool(nextTool) {
        selectedTool = nextTool;
        for (const button of toolButtons) {
          button.classList.toggle("active", button.dataset.tool === nextTool);
        }
      }

      for (const button of toolButtons) {
        button.addEventListener("click", () => setTool(button.dataset.tool));
      }

      colorPicker.addEventListener("input", () => {
        selectedColor = colorPicker.value;
      });

      sizePicker.addEventListener("input", () => {
        selectedWidth = Number(sizePicker.value);
        sizeValue.textContent = String(selectedWidth);
      });

      fillToggle.addEventListener("change", () => {
        fillShapes = fillToggle.checked;
      });

      function toolOf(stroke) {
        return stroke.tool || "pen";
      }

      function isCommandTool(tool) {
        return tool === "undo" || tool === "redo" || tool === "clear";
      }

      function flattenEvents(baseEntries) {
        const events = [];
        for (const entry of baseEntries) {
          events.push({ stroke: entry.stroke, pending: false });
        }
        for (const stroke of pending.values()) {
          events.push({ stroke, pending: true });
        }
        return events;
      }

      function resolveVisibleDraws(events) {
        const visible = [];
        const redoStack = [];

        for (const event of events) {
          const tool = toolOf(event.stroke);

          if (tool === "undo") {
            if (visible.length > 0) {
              redoStack.push(visible.pop());
            }
            continue;
          }

          if (tool === "redo") {
            if (redoStack.length > 0) {
              visible.push(redoStack.pop());
            }
            continue;
          }

          if (tool === "clear") {
            visible.length = 0;
            redoStack.length = 0;
            continue;
          }

          visible.push(event);
          redoStack.length = 0;
        }

        return { visible, canUndo: visible.length > 0, canRedo: redoStack.length > 0 };
      }

      function refreshActionButtons() {
        const state = resolveVisibleDraws(flattenEvents(committed));
        undoBtn.disabled = !state.canUndo;
        redoBtn.disabled = !state.canRedo;
      }

      function resizeCanvas() {
        const ratio = window.devicePixelRatio || 1;
        const width = canvas.clientWidth;
        const height = canvas.clientHeight;
        canvas.width = Math.floor(width * ratio);
        canvas.height = Math.floor(height * ratio);
        ctx.setTransform(ratio, 0, 0, ratio, 0, 0);
      }

      function drawStroke(stroke, options = {}) {
        const tool = toolOf(stroke);

        if (isCommandTool(tool)) {
          return;
        }

        if (!stroke.points || stroke.points.length < 1) return;
        const points = stroke.points;
        const preview = options.preview === true;

        ctx.save();
        ctx.lineJoin = "round";
        ctx.lineCap = "round";

        if (tool === "eraser" && !preview) {
          ctx.globalCompositeOperation = "destination-out";
          ctx.strokeStyle = "rgba(0,0,0,1)";
        } else {
          ctx.globalCompositeOperation = "source-over";
          ctx.strokeStyle = options.colorOverride || stroke.color || "#161616";
        }

        ctx.lineWidth = stroke.width || 3;

        if (tool === "pen" || tool === "eraser") {
          if (points.length < 2) {
            ctx.restore();
            return;
          }
          ctx.beginPath();
          ctx.moveTo(points[0].x, points[0].y);
          for (let i = 1; i < points.length; i++) {
            ctx.lineTo(points[i].x, points[i].y);
          }
          ctx.stroke();
          ctx.restore();
          return;
        }

        if (points.length < 2) {
          ctx.restore();
          return;
        }

        const start = points[0];
        const end = points[1];

        if (tool === "line") {
          ctx.beginPath();
          ctx.moveTo(start.x, start.y);
          ctx.lineTo(end.x, end.y);
          ctx.stroke();
          ctx.restore();
          return;
        }

        if (tool === "rect") {
          const x = Math.min(start.x, end.x);
          const y = Math.min(start.y, end.y);
          const w = Math.abs(end.x - start.x);
          const h = Math.abs(end.y - start.y);
          if (stroke.filled) {
            ctx.fillStyle = options.colorOverride || stroke.color || "#161616";
            ctx.fillRect(x, y, w, h);
          }
          ctx.strokeRect(x, y, w, h);
          ctx.restore();
          return;
        }

        if (tool === "circle") {
          const radius = Math.hypot(end.x - start.x, end.y - start.y);
          ctx.beginPath();
          ctx.arc(start.x, start.y, radius, 0, Math.PI * 2);
          if (stroke.filled) {
            ctx.fillStyle = options.colorOverride || stroke.color || "#161616";
            ctx.fill();
          }
          ctx.stroke();
          ctx.restore();
        }
      }

      function redrawBase(baseEntries) {
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        const state = resolveVisibleDraws(flattenEvents(baseEntries));
        for (const event of state.visible) {
          if (event.pending) {
            drawStroke(event.stroke, {
              colorOverride: toolOf(event.stroke) === "eraser" ? "#55555588" : "#ef4444aa",
              preview: true,
            });
          } else {
            drawStroke(event.stroke);
          }
        }

        undoBtn.disabled = !state.canUndo;
        redoBtn.disabled = !state.canRedo;
      }

      let committed = [];
      let currentStroke = null;
      let ws = null;

      function wsUrl() {
        const isSecure = location.protocol === "https:";
        const proto = isSecure ? "wss" : "ws";
        return `${proto}://${location.hostname}:3000/ws`;
      }

      function connect() {
        ws = new WebSocket(wsUrl());

        ws.addEventListener("open", () => {
          statusEl.textContent = "Connected";
        });

        ws.addEventListener("close", () => {
          statusEl.textContent = "Reconnecting...";
          setTimeout(connect, 900);
        });

        ws.addEventListener("message", (event) => {
          const message = JSON.parse(event.data);

          if (message.type === "init") {
            committed = message.entries;
            redrawBase(committed);
            return;
          }

          if (message.type === "committed") {
            committed.push({
              index: message.logIndex,
              term: 0,
              stroke: message.stroke,
            });
            for (const [localId, stroke] of pending.entries()) {
              if (JSON.stringify(stroke) === JSON.stringify(message.stroke)) {
                pending.delete(localId);
                break;
              }
            }
            redrawBase(committed);
          }
        });
      }

      function queueStroke(stroke) {
        const localId = `${Date.now()}-${Math.random().toString(16).slice(2)}`;
        pending.set(localId, stroke);
        redrawBase(committed);

        if (ws && ws.readyState === WebSocket.OPEN) {
          ws.send(
            JSON.stringify({
              type: "stroke",
              stroke,
              localId,
            }),
          );
        }
      }

      function sendCommand(commandTool) {
        queueStroke({
          tool: commandTool,
          points: [],
          color: "#161616",
          width: 1,
        });
      }

      function snappedLinePoint(start, point) {
        const dx = point.x - start.x;
        const dy = point.y - start.y;
        const angle = Math.atan2(dy, dx);
        const step = Math.PI / 4;
        const snapped = Math.round(angle / step) * step;
        const length = Math.hypot(dx, dy);
        return {
          x: start.x + Math.cos(snapped) * length,
          y: start.y + Math.sin(snapped) * length,
        };
      }

      function downloadCanvas() {
        const link = document.createElement("a");
        link.href = canvas.toDataURL("image/png");
        link.download = `raft-board-${Date.now()}.png`;
        link.click();
      }

      function pointFromEvent(e) {
        const rect = canvas.getBoundingClientRect();
        return {
          x: e.clientX - rect.left,
          y: e.clientY - rect.top,
        };
      }

      canvas.addEventListener("pointerdown", (e) => {
        canvas.setPointerCapture(e.pointerId);
        const start = pointFromEvent(e);
        currentStroke = {
          points: [start],
          color: selectedColor,
          width: selectedWidth,
          tool: selectedTool,
          filled: fillShapes,
        };
      });

      canvas.addEventListener("pointermove", (e) => {
        if (!currentStroke) return;
        let nextPoint = pointFromEvent(e);
        const tool = toolOf(currentStroke);

        if (tool === "pen" || tool === "eraser") {
          currentStroke.points.push(nextPoint);
        } else if (currentStroke.points.length === 1) {
          if (tool === "line" && e.shiftKey) {
            nextPoint = snappedLinePoint(currentStroke.points[0], nextPoint);
          }
          currentStroke.points.push(nextPoint);
        } else {
          if (tool === "line" && e.shiftKey) {
            nextPoint = snappedLinePoint(currentStroke.points[0], nextPoint);
          }
          currentStroke.points[1] = nextPoint;
        }

        redrawBase(committed);
        drawStroke(currentStroke, {
          colorOverride: tool === "eraser" ? "#55555588" : `${currentStroke.color}cc`,
          preview: true,
        });
      });

      function finishStroke() {
        if (!currentStroke) {
          return;
        }

        const tool = toolOf(currentStroke);
        if ((tool === "pen" || tool === "eraser") && currentStroke.points.length < 2) {
          currentStroke = null;
          return;
        }

        if ((tool === "line" || tool === "rect" || tool === "circle") && currentStroke.points.length < 2) {
          currentStroke = null;
          return;
        }

        queueStroke(currentStroke);

        currentStroke = null;
      }

      canvas.addEventListener("pointerup", finishStroke);
      canvas.addEventListener("pointercancel", () => {
        currentStroke = null;
        redrawBase(committed);
      });

      undoBtn.addEventListener("click", () => sendCommand("undo"));
      redoBtn.addEventListener("click", () => sendCommand("redo"));
      clearBtn.addEventListener("click", () => sendCommand("clear"));
      downloadBtn.addEventListener("click", downloadCanvas);

      window.addEventListener("keydown", (event) => {
        const isPrimary = event.ctrlKey || event.metaKey;
        if (!isPrimary) {
          return;
        }

        const key = event.key.toLowerCase();
        if (key === "z" && !event.shiftKey) {
          event.preventDefault();
          sendCommand("undo");
          return;
        }

        if (key === "y" || (key === "z" && event.shiftKey)) {
          event.preventDefault();
          sendCommand("redo");
        }
      });

      window.addEventListener("resize", () => {
        resizeCanvas();
        redrawBase(committed);
      });

      resizeCanvas();
      refreshActionButtons();
      connect();
    </script>
  </body>
</html>
